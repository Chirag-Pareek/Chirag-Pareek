<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      .title {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 700;
        font-size: 38px;
        fill: #FFFFFF;
        letter-spacing: 8px;
      }
      .subtitle {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 500;
        font-size: 16px;
        fill: #C5B0F4;
        letter-spacing: 2px;
      }
      .tag-text {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 500;
        font-size: 11px;
        fill: #DCEEB1;
        letter-spacing: 1px;
      }
      .grid-lines {
        stroke: #1E1E1E;
        stroke-width: 1;
        stroke-opacity: 0.6;
      }
      .accents {
        stroke: #333333;
        stroke-width: 1;
      }
    </style>
    <radialGradient id="glow-magenta" cx="85%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#FF3D8B" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-lilac" cx="15%" cy="15%" r="50%">
      <stop offset="0%" stop-color="#C5B0F4" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Canvas Background -->
  <rect width="800" height="260" fill="#000000"/>

  <!-- Radial Glow Accents -->
  <rect width="800" height="260" fill="url(#glow-magenta)"/>
  <rect width="800" height="260" fill="url(#glow-lilac)"/>

  <!-- Subtle grid layout -->
  <g class="grid-lines">
    <!-- Vertical lines -->
    <line x1="100" y1="0" x2="100" y2="260"/>
    <line x1="200" y1="0" x2="200" y2="260"/>
    <line x1="300" y1="0" x2="300" y2="260"/>
    <line x1="400" y1="0" x2="400" y2="260"/>
    <line x1="500" y1="0" x2="500" y2="260"/>
    <line x1="600" y1="0" x2="600" y2="260"/>
    <line x1="700" y1="0" x2="700" y2="260"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="65" x2="800" y2="65"/>
    <line x1="0" y1="130" x2="800" y2="130"/>
    <line x1="0" y1="195" x2="800" y2="195"/>
  </g>

  <!-- Sleek borders & corner frames -->
  <rect x="20" y="20" width="760" height="220" fill="none" stroke="#333333" stroke-width="1"/>
  <!-- Corner bracket decorations -->
  <path d="M 15,35 L 15,15 L 35,15" fill="none" stroke="#FF3D8B" stroke-width="2"/>
  <path d="M 785,35 L 785,15 L 765,15" fill="none" stroke="#333333" stroke-width="2"/>
  <path d="M 15,225 L 15,245 L 35,245" fill="none" stroke="#333333" stroke-width="2"/>
  <path d="M 785,225 L 785,245 L 765,245" fill="none" stroke="#C5B0F4" stroke-width="2"/>

  <!-- Text elements -->
  <g transform="translate(60, 95)">
    <!-- Decorative tiny tag -->
    <rect x="0" y="-35" width="165" height="20" rx="3" fill="#1E1E1E" stroke="#333333" stroke-width="1"/>
    <circle cx="12" cy="-25" r="4" fill="#1EA64A"/>
    <text x="24" y="-21" class="tag-text">AVAILABLE FOR WORK</text>

    <!-- Main Title -->
    <text x="0" y="25" class="title">CHIRAG PAREEK</text>

    <!-- Subtitle -->
    <text x="0" y="60" class="subtitle">Full-Stack Developer • AI Product Builder</text>

    <!-- Tiny status info -->
    <text x="0" y="95" font-family="JetBrains Mono, monospace" font-size="11" fill="#888888" letter-spacing="1px">&gt; typescript, react, react native, flutter, node.js</text>
  </g>
  
  <!-- Modern chart dot decorations at top right -->
  <g transform="translate(710, 45)" opacity="0.8">
    <circle cx="0" cy="0" r="3" fill="#FF3D8B"/>
    <circle cx="15" cy="0" r="3" fill="#C5B0F4"/>
    <circle cx="30" cy="0" r="3" fill="#DCEEB1"/>
    <circle cx="45" cy="0" r="3" fill="#C8E6CD"/>
  </g>
</svg>
